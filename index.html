<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHIMHIU - Official Edition</title>
    
    <!-- Libraries: DPlayer, HLS.js, FontAwesome -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js/dist/hls.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.js"></script>
    
    <style>
        :root {
            --bg: #050505; --text: #ffffff; --primary: #e50914;
            --glass: rgba(255, 255, 255, 0.08); --glass-border: rgba(255, 255, 255, 0.12);
        }
        [data-theme="light"] {
            --bg: #f8f9fa; --text: #1a1a1a; --primary: #e50914;
            --glass: rgba(0, 0, 0, 0.05); --glass-border: rgba(0, 0, 0, 0.08);
        }

        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; 
            margin: 0; transition: 0.5s ease; overflow-x: hidden;
        }

        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .fade-in { animation: fadeIn 0.8s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Header & Search */
        .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        h1 { letter-spacing: 8px; color: var(--primary); cursor: pointer; font-size: 32px; font-weight: 900; margin: 0; }
        
        .search-wrapper { position: relative; max-width: 500px; margin: 0 auto 50px; }
        input { 
            width: 100%; padding: 16px 30px; border-radius: 50px; 
            border: 1px solid var(--glass-border); background: var(--glass); 
            color: var(--text); font-size: 16px; outline: none; backdrop-filter: blur(15px);
        }

        /* Player & Overlay Control */
        #video-container { 
            width: 100%; margin-bottom: 40px; border-radius: 20px; 
            overflow: hidden; background: #000; display: none; 
            aspect-ratio: 16/9; position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
        }

        #video-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 50; display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.2); transition: 0.3s; opacity: 0;
        }
        #video-overlay:hover { opacity: 1; background: rgba(0,0,0,0.4); }

        .control-btn {
            background: none; border: none; color: white; cursor: pointer;
            transition: 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .control-btn:hover { transform: scale(1.1); color: var(--primary); }
        .play-main {
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); font-size: 40px;
        }

        /* Movie Grid */
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 25px; }
        .movie-card { 
            background: var(--glass); border-radius: 15px; overflow: hidden; 
            transition: 0.4s; cursor: pointer; border: 1px solid var(--glass-border); position: relative;
        }
        .movie-card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .movie-card .info { padding: 15px; background: linear-gradient(to top, #000, transparent); position: absolute; bottom: 0; width: 100%; box-sizing: border-box; }

        /* Detail & Episodes */
        #detail-screen { display: none; margin-top: 20px; }
        .episode-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
        .ep-btn { 
            background: var(--glass); padding: 10px 20px; border-radius: 10px; cursor: pointer; 
            font-weight: bold; border: 1px solid var(--glass-border); transition: 0.3s;
        }
        .ep-btn.active, .ep-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }

        .status-bubble {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7); padding: 15px 25px; border-radius: 50px;
            display: none; z-index: 60; pointer-events: none;
        }

        .btn-theater { position: absolute; top: 20px; right: 20px; z-index: 60; background: rgba(0,0,0,0.5); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        body.theater-mode { background: #000; }
        body.theater-mode .container > *:not(#video-container) { opacity: 0.1; pointer-events: none; }
    </style>
</head>
<body data-theme="dark">

<div class="container fade-in">
    <div class="header-nav">
        <h1 onclick="location.reload()">PHIMHIU</h1>
        <button onclick="toggleTheme()" style="background:none; border:none; font-size:24px; cursor:pointer;">🌓</button>
    </div>

    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Tìm phim (ví dụ: Batman, Naraka...)" onkeypress="handleSearch(event)">
    </div>

    <!-- PLAYER AREA -->
    <div id="video-container">
        <button class="btn-theater" onclick="toggleTheater()">Rạp phim</button>
        
        <div id="video-overlay">
            <div style="display: flex; align-items: center; gap: 40px;">
                <button class="control-btn" onclick="playPrevious()" title="Tập trước"><i class="fas fa-step-backward fa-2x"></i></button>
                <button class="control-btn" onclick="rewind(10)" title="Lùi 10s"><i class="fas fa-undo fa-2x"></i></button>
                
                <button class="control-btn play-main" onclick="togglePlayPause()">
                    <i class="fas fa-play" id="play-icon"></i>
                </button>

                <button class="control-btn" onclick="forward(10)" title="Tiến 10s"><i class="fas fa-redo fa-2x"></i></button>
                <button class="control-btn" onclick="playNext()" title="Tập tiếp theo"><i class="fas fa-step-forward fa-2x"></i></button>
            </div>
            <div id="status-bubble" class="status-bubble"></div>
        </div>

        <div id="dplayer"></div>
        <iframe id="iframe-player" src="" allowfullscreen style="display:none; width:100%; height:100%; border:none;"></iframe>
    </div>

    <div id="results-grid" class="movie-grid"></div>

    <div id="detail-screen" class="fade-in">
        <div id="movie-info-content" style="display: flex; gap: 30px; margin-bottom: 30px;"></div>
        <h3>Danh sách tập</h3>
        <div class="episode-list" id="episodes"></div>
    </div>

    <div id="history-section" style="margin-top: 50px;">
        <h3>Vừa xem gần đây</h3>
        <div id="history-grid" class="movie-grid"></div>
    </div>
</div>

<script>
    let dp = null;
    const API_URL = "https://phimapi.com";
    const IMG_BASE = "https://phimimg.com/";

    function fixImg(url) {
        return (url && url.startsWith('http')) ? url : IMG_BASE + url;
    }

    window.onload = () => {
        if(localStorage.getItem('theme') === 'light') toggleTheme();
        displayWatchHistory();
    };

    function toggleTheme() {
        const body = document.body;
        const theme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        body.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
    }

    function toggleTheater() {
        document.body.classList.toggle('theater-mode');
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    async function handleSearch(e) {
        if (e.key === 'Enter') {
            const query = e.target.value.trim();
            if (!query) return;
            const res = await fetch(`${API_URL}/v1/api/tim-kiem?keyword=${query}`);
            const data = await res.json();
            renderMovies(data.data.items);
            document.getElementById('detail-screen').style.display = 'none';
        }
    }

    function renderMovies(items) {
        const grid = document.getElementById('results-grid');
        grid.innerHTML = items.map(item => `
            <div class="movie-card fade-in" onclick="loadDetail('${item.slug}')">
                <img src="${fixImg(item.thumb_url)}" onerror="this.src='https://via.placeholder.com/200x300'">
                <div class="info"><h3>${item.name}</h3><p>${item.year}</p></div>
            </div>
        `).join('');
    }

    async function loadDetail(slug) {
        const res = await fetch(`${API_URL}/v1/api/phim/${slug}`);
        const data = await res.json();
        const movie = data.data.item;
        
        document.getElementById('results-grid').innerHTML = '';
        document.getElementById('detail-screen').style.display = 'block';
        
        document.getElementById('movie-info-content').innerHTML = `
            <img src="${fixImg(movie.thumb_url)}" style="width:200px; border-radius:15px;">
            <div>
                <h2 id="current-title">${movie.name}</h2>
                <p style="color:var(--primary)">${movie.origin_name} (${movie.year})</p>
                <p style="opacity:0.7">${movie.content.replace(/<[^>]*>/g, '').substring(0, 300)}...</p>
            </div>
        `;

        const eps = movie.episodes[0].server_data;
        document.getElementById('episodes').innerHTML = eps.map(ep => `
            <div id="ep-${ep.name}" class="ep-btn" 
                 onclick="startPlay('${ep.link_m3u8}', '${ep.link_embed}', '${slug}', '${ep.name}')">${ep.name}</div>
        `).join('');

        // Tự động phát tập cuối cùng đã xem
        const savedEp = localStorage.getItem('last_ep_' + slug);
        if(savedEp) {
            const epData = eps.find(e => e.name === savedEp) || eps[0];
            startPlay(epData.link_m3u8, epData.link_embed, slug, epData.name);
        }
    }

    function startPlay(m3u8, embed, slug, epName) {
        const container = document.getElementById('video-container');
        container.style.display = 'block';
        localStorage.setItem('last_ep_' + slug, epName);
        saveHistory(document.getElementById('current-title').innerText, slug);

        if (m3u8) {
            document.getElementById('iframe-player').style.display = 'none';
            document.getElementById('dplayer').style.display = 'block';
            if(dp) dp.destroy();
            dp = new DPlayer({
                container: document.getElementById('dplayer'),
                autoplay: true, video: { url: m3u8, type: 'hls' }
            });
            document.getElementById('play-icon').className = "fas fa-pause";
        } else {
            if(dp) dp.pause();
            document.getElementById('dplayer').style.display = 'none';
            document.getElementById('iframe-player').style.display = 'block';
            document.getElementById('iframe-player').src = embed;
        }

        document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('ep-' + epName).classList.add('active');
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    /* Logic điều khiển lớp phủ */
    function togglePlayPause() {
        if(!dp) return;
        if(dp.video.paused) { dp.play(); document.getElementById('play-icon').className="fas fa-pause"; flash("Tiếp tục"); }
        else { dp.pause(); document.getElementById('play-icon').className="fas fa-play"; flash("Tạm dừng"); }
    }
    function forward(s) { if(dp) { dp.seek(dp.video.currentTime + s); flash(`+${s}s`); } }
    function rewind(s) { if(dp) { dp.seek(dp.video.currentTime - s); flash(`-${s}s`); } }
    function playNext() { const act = document.querySelector('.ep-btn.active'); if(act?.nextElementSibling) act.nextElementSibling.click(); }
    function playPrevious() { const act = document.querySelector('.ep-btn.active'); if(act?.previousElementSibling) act.previousElementSibling.click(); }
    
    function flash(text) {
        const b = document.getElementById('status-bubble');
        b.innerText = text; b.style.display = 'block';
        setTimeout(() => b.style.display = 'none', 700);
    }

    function saveHistory(name, slug) {
        let h = JSON.parse(localStorage.getItem('phimhiu_history')) || [];
        h = h.filter(x => x.slug !== slug);
        h.unshift({name, slug});
        localStorage.setItem('phimhiu_history', JSON.stringify(h.slice(0, 10)));
        displayWatchHistory();
    }

    function displayWatchHistory() {
        const h = JSON.parse(localStorage.getItem('phimhiu_history')) || [];
        const grid = document.getElementById('history-grid');
        grid.innerHTML = h.map(i => `
            <div class="movie-card" onclick="loadDetail('${i.slug}')" style="height:80px; display:flex; align-items:center; padding:10px;">
                <h4 style="margin:0">${i.name}</h4>
            </div>
        `).join('');
    }

    // Hotkeys
    document.addEventListener('keydown', (e) => {
        if(document.activeElement.tagName === 'INPUT') return;
        if(e.code === 'Space') { e.preventDefault(); togglePlayPause(); }
        if(e.code === 'ArrowRight') forward(10);
        if(e.code === 'ArrowLeft') rewind(10);
    });
</script>

</body>
</html>
