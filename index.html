<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHIMHIU- Nguồn Thuyết Minh & Vietsub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/framer-motion@11.11.11/dist/framer-motion.js"></script>

    <style>
        :root { --primary: #e50914; }
        body { background: #050505; color: #ececec; margin: 0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .netflix-gradient { background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%); }
        
        /* Tùy chỉnh thanh cuộn */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        /* Ẩn control mặc định của DPlayer để dùng UI tùy chỉnh nếu cần */
        .dplayer-controller { transition: opacity 0.3s ease; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        const API_BASE = "https://phimapi.com/v1/api";
        const IMG_CDN = "https://img.phimapi.com/";

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{width: size, height: size}}></i>;
        };

        function App() {
            const [searchQuery, setSearchQuery] = useState('');
            const [results, setResults] = useState([]);
            const [currentMovie, setCurrentMovie] = useState(null);
            const [history, setHistory] = useState(JSON.parse(localStorage.getItem('watchHistory') || '[]'));
            const [loading, setLoading] = useState(false);
            
            // Player States
            const [activeServerIdx, setActiveServerIdx] = useState(0);
            const [playingEp, setPlayingEp] = useState(null);
            const [currentEpIndex, setCurrentEpIndex] = useState(-1);
            const [showUI, setShowUI] = useState(true);
            
            const dpRef = useRef(null);
            const player = useRef(null);
            const uiTimeout = useRef(null);

            const activeUI = () => {
                setShowUI(true);
                clearTimeout(uiTimeout.current);
                uiTimeout.current = setTimeout(() => setShowUI(false), 3000);
            };

            const handleSearch = async (e) => {
                e.preventDefault();
                if (!searchQuery.trim()) return;
                setLoading(true);
                try {
                    const resp = await fetch(`${API_BASE}/tim-kiem?keyword=${searchQuery}`);
                    const data = await resp.json();
                    setResults(data.data.items);
                    setCurrentMovie(null);
                    setPlayingEp(null);
                } catch (err) { console.error(err); } finally { setLoading(false); }
            };

            const fetchMovieDetail = async (slug) => {
                setLoading(true);
                try {
                    const resp = await fetch(`${API_BASE}/phim/${slug}`);
                    const data = await resp.json();
                    if (data.status) {
                        setCurrentMovie(data.data.item);
                        setResults([]);
                        setActiveServerIdx(0); // Mặc định server đầu tiên
                    }
                } catch (err) { console.error(err); } finally { setLoading(false); }
            };

            const playEpisode = (ep, index, serverIdx = activeServerIdx) => {
                setPlayingEp(ep.name);
                setCurrentEpIndex(index);
                setActiveServerIdx(serverIdx);

                // Lưu lịch sử
                const newHistory = [
                    { name: currentMovie.name, slug: currentMovie.slug, thumb: currentMovie.thumb_url },
                    ...history.filter(h => h.slug !== currentMovie.slug)
                ].slice(0, 12);
                setHistory(newHistory);
                localStorage.setItem('watchHistory', JSON.stringify(newHistory));

                // Khởi tạo DPlayer
                setTimeout(() => {
                    if (dpRef.current) {
                        if (player.current) player.current.destroy();
                        player.current = new DPlayer({
                            container: dpRef.current,
                            autoplay: true,
                            video: { url: ep.link_m3u8, type: 'hls' },
                            theme: '#e50914'
                        });

                        // Ghi nhớ thời gian xem
                        const timeKey = `time_${currentMovie.slug}_${index}`;
                        const savedTime = localStorage.getItem(timeKey);
                        if (savedTime) player.current.seek(parseFloat(savedTime));

                        player.current.on('timeupdate', () => {
                            localStorage.setItem(timeKey, player.current.video.currentTime);
                        });
                    }
                }, 100);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            return (
                <div className="min-h-screen" onMouseMove={activeUI}>
                    {/* Header */}
                    <nav className="p-6 flex flex-col md:flex-row justify-between items-center gap-6 sticky top-0 z-50 bg-[#050505]/80 backdrop-blur-md">
                        <h1 
                            className="text-3xl font-black tracking-[6px] text-[#e50914] cursor-pointer" 
                            onClick={() => { setResults([]); setCurrentMovie(null); setPlayingEp(null); }}
                        >
                            PHIMHIU
                        </h1>
                        
                        <form onSubmit={handleSearch} className="relative w-full max-w-md group">
                            <input 
                                type="text" 
                                placeholder="Tìm kiếm phim có thuyết minh..."
                                className="w-full pl-12 pr-6 py-3 rounded-full glass focus:border-[#e50914] outline-none transition-all"
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                            />
                            <Icon name="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-[#e50914]" />
                        </form>
                    </nav>

                    <main className="max-w-6xl mx-auto px-4 pb-20">
                        <AnimatePresence mode="wait">
                            {/* Trình phát Video */}
                            {currentMovie && playingEp && (
                                <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="mb-10">
                                    <div className="relative aspect-video rounded-2xl overflow-hidden bg-black shadow-2xl ring-1 ring-white/10">
                                        <div ref={dpRef} className="w-full h-full" />
                                    </div>
                                    
                                    {/* Controller & Server Selection */}
                                    <div className="mt-6 glass p-6 rounded-2xl flex flex-col md:flex-row justify-between items-center gap-6">
                                        <div className="flex flex-col gap-1">
                                            <h2 className="text-xl font-bold">{currentMovie.name}</h2>
                                            <p className="text-sm text-[#e50914] font-bold uppercase tracking-widest">Đang xem: Tập {playingEp}</p>
                                        </div>

                                        <div className="flex flex-wrap items-center gap-4">
                                            <div className="flex items-center gap-2 bg-white/5 p-1 rounded-xl">
                                                {currentMovie.episodes.map((sv, idx) => (
                                                    <button 
                                                        key={idx}
                                                        onClick={() => {
                                                            const ep = sv.server_data[currentEpIndex];
                                                            if (ep) playEpisode(ep, currentEpIndex, idx);
                                                        }}
                                                        className={`px-4 py-2 rounded-lg text-xs font-bold transition-all ${activeServerIdx === idx ? 'bg-[#e50914] text-white shadow-lg' : 'hover:bg-white/10'}`}
                                                    >
                                                        {sv.server_name}
                                                    </button>
                                                ))}
                                            </div>
                                            <div className="flex gap-2">
                                                <button 
                                                    disabled={currentEpIndex <= 0}
                                                    onClick={() => playEpisode(currentMovie.episodes[activeServerIdx].server_data[currentEpIndex-1], currentEpIndex-1)}
                                                    className="p-3 glass rounded-xl hover:bg-[#e50914] disabled:opacity-20 transition-all"
                                                ><Icon name="skip-back" /></button>
                                                <button 
                                                    disabled={currentEpIndex >= currentMovie.episodes[activeServerIdx].server_data.length - 1}
                                                    onClick={() => playEpisode(currentMovie.episodes[activeServerIdx].server_data[currentEpIndex+1], currentEpIndex+1)}
                                                    className="p-3 glass rounded-xl hover:bg-[#e50914] disabled:opacity-20 transition-all"
                                                ><Icon name="skip-forward" /></button>
                                            </div>
                                        </div>
                                    </div>
                                </motion.div>
                            )}

                            {/* Danh sách kết quả */}
                            {!currentMovie && results.length > 0 && (
                                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
                                    {results.map((item) => (
                                        <div key={item.slug} onClick={() => fetchMovieDetail(item.slug)} className="group cursor-pointer">
                                            <div className="relative aspect-[2/3] rounded-2xl overflow-hidden mb-3 ring-1 ring-white/10 group-hover:ring-[#e50914] transition-all">
                                                <img src={item.thumb_url.startsWith('http') ? item.thumb_url : IMG_CDN + item.thumb_url} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" />
                                                <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                                                    <Icon name="play" size={40} className="fill-[#e50914] text-[#e50914]" />
                                                </div>
                                            </div>
                                            <h3 className="font-bold text-sm truncate">{item.name}</h3>
                                            <p className="text-[10px] text-gray-500 mt-1 uppercase font-bold">{item.year}</p>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {/* Chi tiết phim */}
                            {currentMovie && !playingEp && (
                                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="glass p-8 rounded-3xl">
                                    <div className="flex flex-col md:flex-row gap-10">
                                        <img src={currentMovie.thumb_url} className="w-full md:w-64 rounded-2xl shadow-2xl object-cover aspect-[2/3]" />
                                        <div className="flex-1">
                                            <h2 className="text-4xl font-bold mb-2">{currentMovie.name}</h2>
                                            <p className="text-[#e50914] font-bold mb-6">{currentMovie.origin_name} • {currentMovie.year}</p>
                                            <div className="text-gray-400 leading-relaxed mb-10" dangerouslySetInnerHTML={{ __html: currentMovie.content }} />
                                            
                                            <div className="space-y-6">
                                                <div className="flex flex-wrap gap-3">
                                                    <span className="text-xs font-black uppercase text-gray-500 tracking-widest block w-full">Chọn Server (Nguồn phim)</span>
                                                    {currentMovie.episodes.map((sv, idx) => (
                                                        <button 
                                                            key={idx}
                                                            onClick={() => setActiveServerIdx(idx)}
                                                            className={`px-5 py-2 rounded-lg text-sm font-bold border transition-all ${activeServerIdx === idx ? 'border-[#e50914] bg-[#e50914]' : 'border-white/10 bg-white/5 hover:border-white/30'}`}
                                                        >
                                                            <Icon name="server" size={14} className="inline mr-2" />
                                                            {sv.server_name}
                                                        </button>
                                                    ))}
                                                </div>

                                                <div className="flex flex-wrap gap-2">
                                                    <span className="text-xs font-black uppercase text-gray-500 tracking-widest block w-full">Danh sách tập</span>
                                                    {currentMovie.episodes[activeServerIdx].server_data.map((ep, idx) => (
                                                        <button 
                                                            key={idx}
                                                            onClick={() => playEpisode(ep, idx)}
                                                            className="px-4 py-2 bg-white/5 hover:bg-[#e50914] rounded-lg transition-all text-sm font-bold border border-white/5"
                                                        >
                                                            {ep.name}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </motion.div>
                            )}

                            {/* Lịch sử và Trang chủ */}
                            {!currentMovie && results.length === 0 && (
                                <div className="space-y-12 py-10">
                                    {history.length > 0 && (
                                        <section>
                                            <h2 className="text-xs font-black tracking-[4px] text-[#e50914] uppercase mb-8 flex items-center gap-2">
                                                <Icon name="history" size={16} /> Vừa xem gần đây
                                            </h2>
                                            <div className="grid grid-cols-2 md:grid-cols-6 gap-6">
                                                {history.map((item) => (
                                                    <div key={item.slug} onClick={() => fetchMovieDetail(item.slug)} className="group cursor-pointer">
                                                        <img src={item.thumb} className="rounded-xl aspect-[2/3] object-cover ring-1 ring-white/10 group-hover:ring-[#e50914] transition-all" />
                                                        <p className="mt-2 text-xs font-bold truncate opacity-60 group-hover:opacity-100">{item.name}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </section>
                                    )}
                                    <div className="text-center opacity-20 py-20 border-2 border-dashed border-white/10 rounded-[40px]">
                                        <Icon name="clapperboard" size={60} className="mx-auto mb-4" />
                                        <p className="text-xl font-bold uppercase tracking-widest">Khám phá thế giới điện ảnh</p>
                                    </div>
                                </div>
                            )}
                        </AnimatePresence>
                    </main>

                    {/* Loading Spinner */}
                    {loading && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-md z-[100] flex items-center justify-center">
                            <div className="w-12 h-12 border-4 border-[#e50914] border-t-transparent rounded-full animate-spin"></div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
