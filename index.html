<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHIMHIU - Cinema Cá Nhân</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; text-align: center; }
        h1 { letter-spacing: 8px; color: #e50914; margin-top: 50px; cursor: pointer; text-transform: uppercase; font-size: 36px; }
        
        .search-box { position: relative; width: 100%; max-width: 500px; margin: 0 auto; }
        input { width: 100%; padding: 15px 25px; border-radius: 30px; border: 1px solid #333; background: #111; color: #fff; font-size: 16px; outline: none; box-sizing: border-box; }
        .search-history { text-align: left; margin: 10px 0 30px 15px; display: flex; flex-wrap: wrap; gap: 8px; }
        .search-tag { font-size: 11px; color: #555; background: #0a0a0a; border: 1px solid #222; padding: 4px 10px; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .search-tag:hover { color: #fff; border-color: #e50914; }

        .list { text-align: left; margin-top: 20px; }
        .item { color: #888; text-decoration: none; display: block; padding: 15px; border-bottom: 1px solid #222; }
        .item:hover { color: #fff; background: #111; cursor: pointer; }
        
        .section-title { font-size: 13px; color: #e50914; letter-spacing: 2px; text-align: left; margin-top: 40px; text-transform: uppercase; border-left: 3px solid #e50914; padding-left: 10px; }
        
        #detail-screen { display: none; text-align: left; background: #111; padding: 20px; border-radius: 10px; margin-top: 20px; }
        .movie-info { display: flex; gap: 20px; margin-bottom: 20px; }
        .movie-info img { width: 120px; border-radius: 5px; object-fit: cover; }
        .episode-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 10px; margin-top: 20px; }
        .ep-btn { background: #333; color: #fff; padding: 10px; text-align: center; border-radius: 5px; cursor: pointer; font-size: 13px; }
        .ep-btn:hover { background: #e50914; }
        
        #player-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; flex-direction: column; z-index: 100; }
        iframe { width: 100%; height: 100%; border: none; flex-grow: 1; }
        .btn-back { padding: 15px; color: #fff; background: #222; cursor: pointer; text-align: center; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="container" id="home-screen">
        <h1 onclick="location.reload()">PHIMHIU</h1>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Tìm tên phim..." onkeypress="handleSearch(event)">
            <div id="search-history-list" class="search-history"></div>
        </div>
        
        <div id="results" class="list"></div>
        <div id="watch-history-container"></div>
        
        <div id="detail-screen">
            <div id="movie-content"></div>
            <div class="episode-list" id="episodes"></div>
        </div>
    </div>

    <div id="player-screen">
        <div class="btn-back" onclick="closePlayer()">← QUAY LẠI</div>
        <iframe id="videoFrame" src="" allowfullscreen></iframe>
    </div>

    <script>
        window.onload = () => {
            displaySearchHistory();
            displayWatchHistory();
        };

        async function handleSearch(event) {
            if (event.key === 'Enter') {
                const query = document.getElementById('searchInput').value.trim();
                if (query) {
                    saveSearchQuery(query);
                    executeSearch(query);
                }
            }
        }

        async function executeSearch(query) {
            const response = await fetch(`https://ophim1.com/v1/api/tim-kiem?keyword=${query}`);
            const data = await response.json();
            displayResults(data.data.items);
            document.getElementById('detail-screen').style.display = 'none';
            document.getElementById('watch-history-container').innerHTML = '';
        }

        function displayResults(items) {
            const container = document.getElementById('results');
            container.innerHTML = items.map(item => `
                <div class="item" onclick="showDetail('${item.slug}')">🎬 ${item.name} (${item.year})</div>
            `).join('');
        }

        async function showDetail(slug) {
            const response = await fetch(`https://ophim1.com/v1/api/phim/${slug}`);
            const data = await response.json();
            const movie = data.data.item;
            
            saveToWatchHistory(movie.name, movie.slug);

            document.getElementById('results').innerHTML = '';
            document.getElementById('search-history-list').innerHTML = '';
            document.getElementById('watch-history-container').innerHTML = '';
            document.getElementById('detail-screen').style.display = 'block';
            document.getElementById('movie-content').innerHTML = `
                <div class="movie-info">
                    <img src="${movie.thumb_url}" alt="poster">
                    <div>
                        <h2 style="margin:0">${movie.name}</h2>
                        <p style="color:#888; font-size:13px; line-height:1.4">${movie.content.replace(/<[^>]*>?/gm, '').substring(0,150)}...</p>
                    </div>
                </div>
                <h3>Chọn tập phim:</h3>
            `;
            const episodes = movie.episodes[0].server_data;
            document.getElementById('episodes').innerHTML = episodes.map(ep => `
                <div class="ep-btn" onclick="playVideo('${ep.link_embed}')">${ep.name}</div>
            `).join('');
        }

        function saveSearchQuery(query) {
            let searches = JSON.parse(localStorage.getItem('searchHistory')) || [];
            searches = searches.filter(s => s !== query);
            searches.unshift(query);
            localStorage.setItem('searchHistory', JSON.stringify(searches.slice(0, 5)));
            displaySearchHistory();
        }

        function displaySearchHistory() {
            const searches = JSON.parse(localStorage.getItem('searchHistory')) || [];
            const container = document.getElementById('search-history-list');
            container.innerHTML = searches.map(s => `
                <span class="search-tag" onclick="document.getElementById('searchInput').value='${s}'; executeSearch('${s}')">${s}</span>
            `).join('');
        }

        function saveToWatchHistory(name, slug) {
            let history = JSON.parse(localStorage.getItem('watchHistory')) || [];
            history = history.filter(item => item.slug !== slug);
            history.unshift({ name, slug, time: new Date().toLocaleDateString('vi-VN') });
            localStorage.setItem('watchHistory', JSON.stringify(history.slice(0, 10)));
        }

        function displayWatchHistory() {
            const history = JSON.parse(localStorage.getItem('watchHistory')) || [];
            const container = document.getElementById('watch-history-container');
            if (history.length > 0) {
                container.innerHTML = `<div class="section-title">Danh sách đã xem</div>` + 
                history.map(item => `
                    <div class="item" onclick="showDetail('${item.slug}')">🕒 ${item.name} <span style="float:right; font-size:10px; color:#444">${item.time}</span></div>
                `).join('');
            }
        }

        function playVideo(url) {
            document.getElementById('videoFrame').src = url;
            document.getElementById('player-screen').style.display = 'flex';
        }

        function closePlayer() {
            document.getElementById('player-screen').style.display = 'none';
            document.getElementById('videoFrame').src = '';
            location.reload();
        }
    </script>
</body>
</html>
