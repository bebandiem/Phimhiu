<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHIMHIU - Cinema Cá Nhân</title>
    <style>
        :root {
            --bg: #000; --text: #fff; --item-bg: #111; --border: #222; --primary: #e50914; --sub-text: #888;
        }
        [data-theme="light"] {
            --bg: #f5f5f5; --text: #111; --item-bg: #fff; --border: #ddd; --primary: #e50914; --sub-text: #666;
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; transition: 0.3s; }
        .container { max-width: 800px; margin: auto; text-align: center; }
        
        /* Tiêu đề & Nút giao diện */
        .header-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; }
        h1 { letter-spacing: 8px; color: var(--primary); cursor: pointer; text-transform: uppercase; font-size: 32px; margin: 0; }
        .theme-toggle { background: var(--item-bg); border: 1px solid var(--border); color: var(--text); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 12px; }

        /* Ô tìm kiếm */
        .search-box { width: 100%; max-width: 500px; margin: 30px auto 10px; }
        input { width: 100%; padding: 15px 25px; border-radius: 30px; border: 1px solid var(--border); background: var(--item-bg); color: var(--text); font-size: 16px; outline: none; box-sizing: border-box; }
        .search-history { text-align: left; margin: 10px 0 20px 15px; display: flex; flex-wrap: wrap; gap: 8px; }
        .search-tag { font-size: 11px; color: var(--sub-text); background: var(--item-bg); border: 1px solid var(--border); padding: 4px 10px; border-radius: 15px; cursor: pointer; }

        /* Danh sách phim */
        .list { text-align: left; margin-top: 20px; }
        .item { color: var(--sub-text); text-decoration: none; display: block; padding: 15px; border-bottom: 1px solid var(--border); transition: 0.2s; }
        .item:hover { color: var(--text); background: var(--item-bg); cursor: pointer; }
        .section-title { font-size: 13px; color: var(--primary); letter-spacing: 2px; text-align: left; margin-top: 40px; text-transform: uppercase; border-left: 3px solid var(--primary); padding-left: 10px; }

        /* Chi tiết phim */
        #detail-screen { display: none; text-align: left; background: var(--item-bg); padding: 20px; border-radius: 10px; margin-top: 20px; }
        .movie-info { display: flex; gap: 20px; margin-bottom: 20px; }
        .movie-info img { width: 120px; border-radius: 5px; object-fit: cover; }
        .episode-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin-top: 20px; }
        .ep-btn { background: var(--border); color: var(--text); padding: 10px; text-align: center; border-radius: 5px; cursor: pointer; font-size: 13px; border: 1px solid transparent; }
        .ep-btn.watched { border-color: var(--primary); color: var(--primary); font-weight: bold; }
        .ep-btn:hover { background: var(--primary); color: #fff; }

        /* Skeleton Loading */
        .skeleton { height: 50px; background: var(--item-bg); margin-bottom: 10px; border-radius: 5px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* Player */
        #player-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; flex-direction: column; z-index: 100; }
        iframe { width: 100%; height: 100%; border: none; flex-grow: 1; }
        .btn-back { padding: 15px; color: #fff; background: #222; cursor: pointer; text-align: center; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body data-theme="dark">

    <div class="container" id="home-screen">
        <div class="header-nav">
            <h1 onclick="location.reload()">PHIMHIU</h1>
            <button class="theme-toggle" onclick="toggleTheme()">Sáng/Tối</button>
        </div>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Tìm tên phim..." onkeypress="handleSearch(event)">
            <div id="search-history-list" class="search-history"></div>
        </div>
        
        <div id="loading" style="display:none">
            <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
        </div>

        <div id="results" class="list"></div>
        <div id="watch-history-container"></div>
        
        <div id="detail-screen">
            <div id="movie-content"></div>
            <div class="episode-list" id="episodes"></div>
        </div>
    </div>

    <div id="player-screen">
        <div class="btn-back" onclick="closePlayer()">← QUAY LẠI</div>
        <iframe id="videoFrame" src="" allowfullscreen></iframe>
    </div>

    <script>
        window.onload = () => {
            displaySearchHistory();
            displayWatchHistory();
            if(localStorage.getItem('theme') === 'light') toggleTheme();
        };

        function toggleTheme() {
            const body = document.body;
            const current = body.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }

        async function handleSearch(event) {
            if (event.key === 'Enter') {
                const query = document.getElementById('searchInput').value.trim();
                if (query) {
                    saveSearchQuery(query);
                    document.getElementById('loading').style.display = 'block';
                    document.getElementById('results').innerHTML = '';
                    document.getElementById('watch-history-container').innerHTML = '';
                    const response = await fetch(`https://ophim1.com/v1/api/tim-kiem?keyword=${query}`);
                    const data = await response.json();
                    document.getElementById('loading').style.display = 'none';
                    displayResults(data.data.items);
                }
            }
        }

        function displayResults(items) {
            const container = document.getElementById('results');
            container.innerHTML = items.map(item => `
                <div class="item" onclick="showDetail('${item.slug}')">🎬 ${item.name} (${item.year})</div>
            `).join('');
        }

        async function showDetail(slug) {
            const response = await fetch(`https://ophim1.com/v1/api/phim/${slug}`);
            const data = await response.json();
            const movie = data.data.item;
            saveToWatchHistory(movie.name, movie.slug);
            
            // Lấy danh sách tập đã xem của phim này
            const watchedEps = JSON.parse(localStorage.getItem('watched_' + slug)) || [];

            document.getElementById('results').innerHTML = '';
            document.getElementById('search-history-list').innerHTML = '';
            document.getElementById('watch-history-container').innerHTML = '';
            document.getElementById('detail-screen').style.display = 'block';
            document.getElementById('movie-content').innerHTML = `
                <div class="movie-info">
                    <img src="${movie.thumb_url}" alt="poster">
                    <div>
                        <h2 style="margin:0">${movie.name}</h2>
                        <p style="color:var(--sub-text); font-size:13px;">${movie.content.replace(/<[^>]*>?/gm, '').substring(0,150)}...</p>
                    </div>
                </div>
                <h3>Chọn tập phim:</h3>
            `;
            const episodes = movie.episodes[0].server_data;
            document.getElementById('episodes').innerHTML = episodes.map(ep => `
                <div class="ep-btn ${watchedEps.includes(ep.name) ? 'watched' : ''}" 
                     onclick="playVideo('${ep.link_embed}', '${slug}', '${ep.name}')">Tập ${ep.name}</div>
            `).join('');
        }

        function playVideo(url, slug, epName) {
            // Lưu trạng thái đã xem tập này
            let watchedEps = JSON.parse(localStorage.getItem('watched_' + slug)) || [];
            if(!watchedEps.includes(epName)) watchedEps.push(epName);
            localStorage.setItem('watched_' + slug, JSON.stringify(watchedEps));

            document.getElementById('videoFrame').src = url;
            document.getElementById('player-screen').style.display = 'flex';
        }

        // --- CÁC HÀM LỊCH SỬ ---
        function saveSearchQuery(query) {
            let searches = JSON.parse(localStorage.getItem('searchHistory')) || [];
            searches = searches.filter(s => s !== query);
            searches.unshift(query);
            localStorage.setItem('searchHistory', JSON.stringify(searches.slice(0, 5)));
            displaySearchHistory();
        }

        function displaySearchHistory() {
            const searches = JSON.parse(localStorage.getItem('searchHistory')) || [];
            document.getElementById('search-history-list').innerHTML = searches.map(s => `
                <span class="search-tag" onclick="document.getElementById('searchInput').value='${s}'; handleSearch({key:'Enter'})">${s}</span>
            `).join('');
        }

        function saveToWatchHistory(name, slug) {
            let history = JSON.parse(localStorage.getItem('watchHistory')) || [];
            history = history.filter(item => item.slug !== slug);
            history.unshift({ name, slug, time: new Date().toLocaleDateString('vi-VN') });
            localStorage.setItem('watchHistory', JSON.stringify(history.slice(0, 10)));
        }

        function displayWatchHistory() {
            const history = JSON.parse(localStorage.getItem('watchHistory')) || [];
            const container = document.getElementById('watch-history-container');
            if (history.length > 0) {
                container.innerHTML = `<div class="section-title">Danh sách đã xem</div>` + 
                history.map(item => `<div class="item" onclick="showDetail('${item.slug}')">🕒 ${item.name}</div>`).join('');
            }
        }

        function closePlayer() {
            document.getElementById('player-screen').style.display = 'none';
            document.getElementById('videoFrame').src = '';
            location.reload();
        }
    </script>
</body>
</html>
