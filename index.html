<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHIMHIU - Pro Cinema</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js/dist/hls.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.js"></script>
    
    <style>
        :root { --bg: #000; --text: #fff; --item-bg: #111; --border: #222; --primary: #e50914; --sub-text: #888; }
        [data-theme="light"] { --bg: #f5f5f5; --text: #111; --item-bg: #fff; --border: #ddd; --primary: #e50914; --sub-text: #666; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 10px; transition: 0.3s; }
        .container { max-width: 900px; margin: auto; }
        
        .header-nav { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; }
        h1 { letter-spacing: 5px; color: var(--primary); cursor: pointer; text-transform: uppercase; font-size: 28px; margin: 0; }
        .theme-toggle { background: var(--item-bg); border: 1px solid var(--border); color: var(--text); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 11px; }

        .search-box { width: 100%; max-width: 500px; margin: 0 auto 20px; }
        input { width: 100%; padding: 12px 20px; border-radius: 25px; border: 1px solid var(--border); background: var(--item-bg); color: var(--text); font-size: 16px; outline: none; box-sizing: border-box; }

        /* KHU VỰC TRÌNH PHÁT LINH HOẠT */
        #video-container { width: 100%; margin-bottom: 20px; border-radius: 8px; overflow: hidden; background: #000; display: none; aspect-ratio: 16/9; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #dplayer { width: 100%; height: 100%; }
        #iframe-player { width: 100%; height: 100%; border: none; display: none; }

        .list { text-align: left; margin-top: 10px; }
        .item { color: var(--sub-text); text-decoration: none; display: block; padding: 12px; border-bottom: 1px solid var(--border); transition: 0.2s; cursor: pointer; }
        .item:hover { color: var(--text); background: var(--item-bg); }
        
        #detail-screen { display: none; text-align: left; background: var(--item-bg); padding: 15px; border-radius: 10px; margin-top: 10px; }
        .movie-info { display: flex; gap: 15px; margin-bottom: 15px; }
        .movie-info img { width: 100px; border-radius: 5px; object-fit: cover; }
        .episode-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 8px; margin-top: 15px; }
        .ep-btn { background: var(--border); color: var(--text); padding: 8px; text-align: center; border-radius: 4px; cursor: pointer; font-size: 12px; border: 1px solid transparent; }
        .ep-btn.active { background: var(--primary); color: #fff; font-weight: bold; }
        .ep-btn.watched { border-color: var(--primary); color: var(--primary); }
    </style>
</head>
<body data-theme="dark">

    <div class="container">
        <div class="header-nav">
            <h1 onclick="location.reload()">PHIMHIU</h1>
            <button class="theme-toggle" onclick="toggleTheme()">Sáng/Tối</button>
        </div>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Tìm tên phim..." onkeypress="handleSearch(event)">
        </div>

        <div id="video-container">
            <div id="dplayer"></div>
            <iframe id="iframe-player" src="" allowfullscreen></iframe>
        </div>
        
        <div id="results" class="list"></div>
        <div id="detail-screen">
            <div id="movie-content"></div>
            <div class="episode-list" id="episodes"></div>
        </div>
        <div id="watch-history" class="list"></div>
    </div>

    <script>
        let dp;

        window.onload = () => {
            displayWatchHistory();
            if(localStorage.getItem('theme') === 'light') toggleTheme();
        };

        function toggleTheme() {
            const body = document.body;
            const current = body.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }

        async function handleSearch(event) {
            if (event.key === 'Enter') {
                const query = document.getElementById('searchInput').value.trim();
                if (query) {
                    const response = await fetch(`https://ophim1.com/v1/api/tim-kiem?keyword=${query}`);
                    const data = await response.json();
                    displayResults(data.data.items);
                    document.getElementById('detail-screen').style.display = 'none';
                    document.getElementById('video-container').style.display = 'none';
                }
            }
        }

        function displayResults(items) {
            const container = document.getElementById('results');
            container.innerHTML = items.map(item => `
                <div class="item" onclick="showDetail('${item.slug}')">🎬 ${item.name} (${item.year})</div>
            `).join('');
        }

        async function showDetail(slug) {
            const response = await fetch(`https://ophim1.com/v1/api/phim/${slug}`);
            const data = await response.json();
            const movie = data.data.item;
            saveToWatchHistory(movie.name, movie.slug);
            
            document.getElementById('results').innerHTML = '';
            document.getElementById('detail-screen').style.display = 'block';
            document.getElementById('movie-content').innerHTML = `
                <div class="movie-info">
                    <img src="${movie.thumb_url}" alt="poster">
                    <div><h2 style="margin:0">${movie.name}</h2><p style="color:var(--sub-text); font-size:12px;">${movie.content.replace(/<[^>]*>?/gm, '').substring(0,80)}...</p></div>
                </div>
            `;
            const episodes = movie.episodes[0].server_data;
            document.getElementById('episodes').innerHTML = episodes.map(ep => `
                <div id="ep-${ep.name}" class="ep-btn" 
                     onclick="playSmart('${ep.link_m3u8}', '${ep.link_embed}', '${slug}', '${ep.name}')">Tập ${ep.name}</div>
            `).join('');
        }

        // HÀM CHỌN PLAYER THÔNG MINH
        function playSmart(m3u8Url, embedUrl, slug, epName) {
            document.getElementById('video-container').style.display = 'block';
            window.scrollTo({top: 0, behavior: 'smooth'});

            if (m3u8Url && m3u8Url !== "") {
                // Ưu tiên 1: Chạy DPlayer
                document.getElementById('iframe-player').style.display = 'none';
                document.getElementById('dplayer').style.display = 'block';
                if(dp) dp.destroy(); // Xóa trình phát cũ nếu có
                dp = new DPlayer({
                    container: document.getElementById('dplayer'),
                    autoplay: true,
                    video: { url: m3u8Url, type: 'hls' },
                    shortcut: true
                });
            } else {
                // Ưu tiên 2: Chạy Iframe
                if(dp) dp.pause();
                document.getElementById('dplayer').style.display = 'none';
                document.getElementById('iframe-player').style.display = 'block';
                document.getElementById('iframe-player').src = embedUrl;
            }

            // Đánh dấu tập đang xem
            document.querySelectorAll('.ep-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('ep-' + epName).classList.add('active');
        }

        function saveToWatchHistory(name, slug) {
            let history = JSON.parse(localStorage.getItem('watchHistory')) || [];
            history = history.filter(item => item.slug !== slug);
            history.unshift({ name, slug });
            localStorage.setItem('watchHistory', JSON.stringify(history.slice(0, 10)));
        }

        function displayWatchHistory() {
            const history = JSON.parse(localStorage.getItem('watchHistory')) || [];
            const container = document.getElementById('watch-history');
            if (history.length > 0) {
                container.innerHTML = `<div style="font-size:12px; color:var(--primary); margin:20px 0 10px;">XEM GẦN ĐÂY</div>` + 
                history.map(item => `<div class="item" onclick="showDetail('${item.slug}')">🕒 ${item.name}</div>`).join('');
            }
        }
    </script>
</body>
</html>
