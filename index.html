<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHIMHIU - Netflix Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/framer-motion@11.11.11/dist/framer-motion.js"></script>

    <style>
        :root { --netflix-red: #e50914; }
        body { background: #000; color: #fff; margin: 0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass-panel { background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%); }
        .dplayer-controller { display: none !important; } /* Ẩn control mặc định của DPlayer để dùng UI Netflix */
        
        input[type='range'] {
            accent-color: var(--netflix-red);
            cursor: pointer;
        }

        .netflix-loader {
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top-color: var(--netflix-red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        const API_BASE = "https://phimapi.com/v1/api";
        const IMG_CDN = "https://img.phimapi.com/";

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{width: size, height: size}}></i>;
        };

        function App() {
            const [theme, setTheme] = useState('dark');
            const [searchQuery, setSearchQuery] = useState('');
            const [results, setResults] = useState([]);
            const [currentMovie, setCurrentMovie] = useState(null);
            const [playingEp, setPlayingEp] = useState(null);
            const [loading, setLoading] = useState(false);
            
            // Player States
            const [isPlaying, setIsPlaying] = useState(false);
            const [progress, setProgress] = useState(0);
            const [showUI, setShowUI] = useState(true);
            const [volume, setVolume] = useState(100);
            const [videoMode, setVideoMode] = useState(null);
            
            const dpRef = useRef(null);
            const player = useRef(null);
            const uiTimeout = useRef(null);

            // Tự động ẩn UI sau 3 giây không tương tác
            const activeUI = () => {
                setShowUI(true);
                clearTimeout(uiTimeout.current);
                uiTimeout.current = setTimeout(() => {
                    if (isPlaying) setShowUI(false);
                }, 3000);
            };

            const togglePlay = () => {
                if (!player.current) return;
                if (player.current.video.paused) {
                    player.current.play();
                    setIsPlaying(true);
                } else {
                    player.current.pause();
                    setIsPlaying(false);
                }
            };

            const skip = (amount) => {
                if (!player.current) return;
                player.current.seek(player.current.video.currentTime + amount);
                activeUI();
            };

            const handleSearch = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const resp = await fetch(`${API_BASE}/tim-kiem?keyword=${searchQuery}`);
                    const data = await resp.json();
                    setResults(data.data.items);
                    setCurrentMovie(null);
                    setPlayingEp(null);
                } catch (err) { console.error(err); }
                finally { setLoading(false); }
            };

            const loadMovie = async (slug) => {
                setLoading(true);
                try {
                    const resp = await fetch(`${API_BASE}/phim/${slug}`);
                    const data = await resp.json();
                    setCurrentMovie(data.data.item);
                    setResults([]);
                } catch (err) { console.error(err); }
                finally { setLoading(false); }
            };

            const playEpisode = (ep) => {
                setPlayingEp(ep);
                setVideoMode(ep.link_m3u8 ? 'hls' : 'embed');
                
                if (ep.link_m3u8) {
                    setTimeout(() => {
                        if (player.current) player.current.destroy();
                        player.current = new DPlayer({
                            container: dpRef.current,
                            video: { url: ep.link_m3u8, type: 'hls' },
                            autoplay: true,
                        });

                        player.current.on('timeupdate', () => {
                            const p = (player.current.video.currentTime / player.current.video.duration) * 100;
                            setProgress(p);
                        });

                        player.current.on('play', () => setIsPlaying(true));
                        player.current.on('pause', () => setIsPlaying(false));
                    }, 100);
                }
            };

            return (
                <div className="min-h-screen" onMouseMove={activeUI} onClick={activeUI}>
                    {/* Header */}
                    <nav className="fixed top-0 w-full z-50 p-6 flex justify-between items-center bg-gradient-to-b from-black/80 to-transparent">
                        <h1 className="text-3xl font-black text-[#e50914] tracking-tighter cursor-pointer" onClick={() => location.reload()}>PHIMHIU</h1>
                        
                        <form onSubmit={handleSearch} className="relative w-full max-w-md mx-4">
                            <input 
                                type="text"
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                                placeholder="Phim, diễn viên, đạo diễn..."
                                className="w-full bg-black/50 border border-white/20 py-2 px-10 rounded-sm focus:outline-none focus:border-white transition-all"
                            />
                            <Icon name="search" className="absolute left-3 top-2.5 opacity-50" size={18} />
                        </form>
                        <div className="w-10 h-10 bg-blue-500 rounded-sm"></div>
                    </nav>

                    <main className="pt-24 px-4 md:px-12">
                        <AnimatePresence>
                            {/* Netflix Player UI */}
                            {playingEp && (
                                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="relative aspect-video w-full max-w-6xl mx-auto rounded-lg overflow-hidden group">
                                    {/* DPlayer Container */}
                                    <div ref={dpRef} className={`w-full h-full ${videoMode === 'embed' ? 'hidden' : ''}`} />
                                    
                                    {videoMode === 'embed' && (
                                        <iframe src={playingEp.link_embed} className="w-full h-full" allowFullScreen />
                                    )}

                                    {/* Netflix Custom Overlay */}
                                    {videoMode === 'hls' && (
                                        <div className={`absolute inset-0 z-10 transition-opacity duration-500 ${showUI ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
                                            {/* Center Controls */}
                                            <div className="absolute inset-0 flex items-center justify-center gap-16">
                                                <button onClick={() => skip(-10)} className="hover:scale-110 transition-transform"><Icon name="rotate-ccw" size={48} /></button>
                                                <button onClick={togglePlay} className="bg-white text-black p-6 rounded-full hover:scale-105 transition-transform">
                                                    <Icon name={isPlaying ? "pause" : "play"} size={40} />
                                                </button>
                                                <button onClick={() => skip(10)} className="hover:scale-110 transition-transform"><Icon name="rotate-cw" size={48} /></button>
                                            </div>

                                            {/* Bottom Controls */}
                                            <div className="absolute bottom-0 w-full p-8 glass-panel space-y-4">
                                                {/* Progress Bar */}
                                                <input 
                                                    type="range" className="w-full h-1" 
                                                    value={progress} 
                                                    onChange={(e) => {
                                                        const time = (e.target.value / 100) * player.current.video.duration;
                                                        player.current.seek(time);
                                                    }}
                                                />
                                                
                                                <div className="flex justify-between items-center">
                                                    <div className="flex items-center gap-8">
                                                        <button onClick={togglePlay}><Icon name={isPlaying ? "pause" : "play"} /></button>
                                                        <div className="flex items-center gap-4 group/vol">
                                                            <Icon name="volume-2" />
                                                            <input 
                                                                type="range" className="w-20" 
                                                                onChange={(e) => {
                                                                    player.current.video.volume = e.target.value / 100;
                                                                    setVolume(e.target.value);
                                                                }}
                                                            />
                                                        </div>
                                                        <span className="text-sm font-bold">{currentMovie?.name} - {playingEp.name}</span>
                                                    </div>
                                                    <div className="flex items-center gap-6">
                                                        <button onClick={() => player.current.fullScreen.request()}><Icon name="maximize" /></button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </motion.div>
                            )}

                            {/* Movie Grid */}
                            {!currentMovie && results.length > 0 && (
                                <div className="grid grid-cols-2 md:grid-cols-5 lg:grid-cols-6 gap-4 py-10">
                                    {results.map((item) => (
                                        <div key={item.slug} onClick={() => loadMovie(item.slug)} className="relative group cursor-pointer transition-transform hover:scale-105 z-10">
                                            <img src={item.thumb_url.startsWith('http') ? item.thumb_url : IMG_CDN + item.thumb_url} className="rounded-md w-full aspect-[2/3] object-cover" />
                                            <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                                                <Icon name="play-circle" size={48} className="text-[#e50914]" />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {/* Detail & Episode List */}
                            {currentMovie && !playingEp && (
                                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="flex flex-col md:flex-row gap-10 py-10">
                                    <img src={currentMovie.thumb_url} className="w-full md:w-80 rounded-lg shadow-2xl" />
                                    <div className="flex-1">
                                        <h2 className="text-5xl font-black mb-4">{currentMovie.name}</h2>
                                        <p className="text-[#e50914] font-bold mb-6">{currentMovie.year} | {currentMovie.quality} | {currentMovie.episode_current}</p>
                                        <div className="text-lg text-gray-300 leading-relaxed mb-10" dangerouslySetInnerHTML={{ __html: currentMovie.content }} />
                                        
                                        <h3 className="text-xl font-bold mb-4">Danh sách tập</h3>
                                        <div className="flex flex-wrap gap-3">
                                            {currentMovie.episodes[0].server_data.map((ep, idx) => (
                                                <button 
                                                    key={idx} 
                                                    onClick={() => playEpisode(ep)}
                                                    className="px-8 py-3 bg-white/10 hover:bg-[#e50914] rounded-md font-bold transition-colors"
                                                >
                                                    Tập {ep.name}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>

                    {loading && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center">
                            <div className="netflix-loader"></div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
