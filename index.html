<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHIMHIU - Minimalist</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js/dist/hls.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.js"></script>
    
    <style>
        :root {
            --bg: #0b0b0b; --text: #ececec; --primary: #e50914;
            --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1);
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        
        /* Tìm kiếm tối giản */
        .search-box { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid var(--border); background: var(--glass); color: white; margin-bottom: 20px; }
        
        /* Kết quả tìm kiếm dạng text */
        .search-item { padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; }
        .search-item:hover { background: var(--glass); color: var(--primary); }

        /* Video & Overlay */
        #video-container { width: 100%; border-radius: 12px; overflow: hidden; display: none; position: relative; margin-bottom: 30px; aspect-ratio: 16/9; }
        .player-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 10; background: rgba(0,0,0,0.4); pointer-events: none; transition: 0.3s; }
        .player-overlay.hidden { opacity: 0; }
        .controls-group { display: flex; gap: 30px; pointer-events: auto; }
        .ov-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .ov-btn.main { font-size: 50px; }

        /* Lịch sử và Tập phim */
        .section-title { color: var(--primary); font-size: 14px; letter-spacing: 2px; margin: 30px 0 15px; text-transform: uppercase; }
        .list-text { display: flex; flex-direction: column; gap: 5px; }
        .history-item { padding: 8px 0; cursor: pointer; font-size: 15px; opacity: 0.8; }
        .history-item:hover { opacity: 1; text-decoration: underline; }
        .ep-btn { background: var(--glass); border: 1px solid var(--border); color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-right: 5px; margin-bottom: 5px; }
        .ep-btn.active { background: var(--primary); border-color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color:var(--primary); cursor:pointer" onclick="location.reload()">PHIMHIU</h1>
    
    <input type="text" id="searchInput" class="search-box" placeholder="Tìm phim, đạo diễn, diễn viên..." onkeypress="handleSearch(event)">

    <div id="video-container">
        <div id="player-overlay" class="player-overlay">
            <div class="controls-group">
                <button class="ov-btn" onclick="changeEpisode(-1)">⏮</button>
                <button class="ov-btn" onclick="seekVideo(-10)">⟲</button>
                <button class="ov-btn main" id="playBtn" onclick="dp.toggle()">▶</button>
                <button class="ov-btn" onclick="seekVideo(10)">⟳</button>
                <button class="ov-btn" onclick="changeEpisode(1)">⏭</button>
            </div>
        </div>
        <div id="dplayer"></div>
    </div>

    <div id="results-list" class="list-text"></div>

    <div id="detail-screen" style="display:none">
        <h2 id="m-title"></h2>
        <div class="section-title">TẬP PHIM</div>
        <div id="episodes"></div>
    </div>

    <div id="history-section">
        <div class="section-title">VỪA XEM GẦN ĐÂY</div>
        <div id="history-list" class="list-text"></div>
    </div>
</div>

<script>
    let dp, currentEpisodes = [], currentIndex = -1, currentSlug = '', overlayTimer;

    // --- KHỞI TẠO: LOAD LỊCH SỬ ---
    window.onload = renderHistory;

    function renderHistory() {
        const history = JSON.parse(localStorage.getItem('phim_history') || '[]');
        const container = document.getElementById('history-list');
        if (history.length === 0) {
            container.innerHTML = '<div style="opacity:0.5">Chưa có lịch sử xem.</div>';
            return;
        }
        container.innerHTML = history.map(item => `
            <div class="history-item" onclick="showDetail('${item.slug}')">• ${item.name}</div>
        `).reverse().join(''); // Hiện phim mới xem lên đầu
    }

    function saveToHistory(name, slug) {
        let history = JSON.parse(localStorage.getItem('phim_history') || '[]');
        history = history.filter(i => i.slug !== slug); // Tránh trùng lặp
        history.push({ name, slug });
        if (history.length > 10) history.shift(); // Giữ tối đa 10 phim
        localStorage.setItem('phim_history', JSON.stringify(history));
        renderHistory();
    }

    // --- TÌM KIẾM TỐI GIẢN ---
    async function handleSearch(event) {
        if (event.key === 'Enter') {
            const query = event.target.value;
            const res = await fetch(`https://ophim1.com/v1/api/tim-kiem?keyword=${query}`);
            const data = await res.json();
            
            // Ẩn các phần không liên quan
            document.getElementById('history-section').style.display = 'none';
            document.getElementById('detail-screen').style.display = 'none';
            document.getElementById('video-container').style.display = 'none';

            // Hiển thị danh sách chữ (không ảnh)
            document.getElementById('results-list').innerHTML = data.data.items.map(item => `
                <div class="search-item" onclick="showDetail('${item.slug}')">
                    <span>${item.name}</span>
                    <span style="opacity:0.5; font-size:12px;">${item.year}</span>
                </div>
            `).join('');
        }
    }

    // --- CHI TIẾT PHIM ---
    async function showDetail(slug) {
        const res = await fetch(`https://ophim1.com/v1/api/phim/${slug}`);
        const data = await res.json();
        const movie = data.data.item;
        
        currentSlug = slug;
        currentEpisodes = movie.episodes[0].server_data;
        saveToHistory(movie.name, slug); // Lưu vào lịch sử khi nhấn vào phim

        document.getElementById('results-list').innerHTML = '';
        document.getElementById('detail-screen').style.display = 'block';
        document.getElementById('m-title').innerText = movie.name;

        document.getElementById('episodes').innerHTML = currentEpisodes.map((ep, i) => `
            <button class="ep-btn" id="ep-${i}" onclick="playEpisode(${i})">${ep.name}</button>
        `).join('');
    }

    // --- TRÌNH PHÁT ---
    function playEpisode(index) {
        if (index < 0 || index >= currentEpisodes.length) return;
        currentIndex = index;
        const ep = currentEpisodes[index];
        document.getElementById('video-container').style.display = 'block';

        if(dp) dp.destroy();
        dp = new DPlayer({
            container: document.getElementById('dplayer'),
            autoplay: true,
            video: { url: ep.link_m3u8, type: 'hls' }
        });

        // Đồng bộ nút Play/Pause trên Overlay
        const pBtn = document.getElementById('playBtn');
        dp.on('play', () => { pBtn.innerText = '⏸'; hideOverlayDelayed(); });
        dp.on('pause', () => { pBtn.innerText = '▶'; showOverlay(); });
        dp.on('ended', () => { if(currentIndex < currentEpisodes.length - 1) playEpisode(currentIndex + 1); });

        document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('ep-' + index).classList.add('active');
    }

    // Logic Overlay
    function showOverlay() { document.getElementById('player-overlay').classList.remove('hidden'); }
    function hideOverlayDelayed() { 
        clearTimeout(overlayTimer);
        overlayTimer = setTimeout(() => {
            if(!dp.video.paused) document.getElementById('player-overlay').classList.add('hidden');
        }, 2000);
    }
    document.getElementById('video-container').addEventListener('mousemove', () => {
        showOverlay();
        hideOverlayDelayed();
    });

    function seekVideo(sec) { dp.seek(dp.video.currentTime + sec); }
    function changeEpisode(step) { playEpisode(currentIndex + step); }
</script>

</body>
</html>
