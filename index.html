<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHIMHIU - KKPhim Edition</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js/dist/hls.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.js"></script>
    
    <style>
        :root {
            --bg: #050505; --text: #ffffff; --primary: #e50914;
            --glass: rgba(255, 255, 255, 0.08); --glass-border: rgba(255, 255, 255, 0.12);
        }
        [data-theme="light"] {
            --bg: #f8f9fa; --text: #1a1a1a; --primary: #e50914;
            --glass: rgba(0, 0, 0, 0.05); --glass-border: rgba(0, 0, 0, 0.08);
        }

        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; 
            margin: 0; transition: 0.5s ease; overflow-x: hidden;
        }

        .fade-in { animation: fadeIn 0.8s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .container { max-width: 1200px; margin: auto; padding: 20px; }
        
        .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        h1 { letter-spacing: 8px; color: var(--primary); cursor: pointer; font-size: 32px; font-weight: 900; margin: 0; }

        .search-wrapper { position: relative; max-width: 450px; margin: 0 auto 50px; transition: 0.4s; }
        .search-wrapper:focus-within { max-width: 600px; }
        input { 
            width: 100%; padding: 16px 30px; border-radius: 50px; 
            border: 1px solid var(--glass-border); background: var(--glass); 
            color: var(--text); font-size: 16px; outline: none; 
            backdrop-filter: blur(15px); transition: 0.4s; box-sizing: border-box;
        }
        input:focus { border-color: var(--primary); background: rgba(229, 9, 20, 0.05); }

        #video-container { 
            width: 100%; margin-bottom: 40px; border-radius: 20px; 
            overflow: hidden; background: #000; display: none; 
            aspect-ratio: 16/9; position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7); z-index: 100; 
        }
        body.theater-mode { background: #000; }
        body.theater-mode .header-nav, body.theater-mode .search-wrapper, body.theater-mode .section-title { opacity: 0.05; pointer-events: none; }

        .movie-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 25px; margin-top: 20px;
        }
        .movie-card { 
            background: var(--glass); border-radius: 15px; overflow: hidden; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; 
            border: 1px solid var(--glass-border); position: relative; backdrop-filter: blur(5px);
        }
        .movie-card:hover { transform: scale(1.05); border-color: var(--primary); }
        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #222; }
        .movie-card .info { padding: 15px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); position: absolute; bottom: 0; width: 100%; box-sizing: border-box; }
        .movie-card h3 { font-size: 14px; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        .movie-card p { font-size: 11px; color: var(--primary); margin: 5px 0 0; }

        #detail-screen { 
            display: none; background: var(--glass); backdrop-filter: blur(30px);
            padding: 40px; border-radius: 30px; border: 1px solid var(--glass-border); margin-top: 20px;
        }
        .detail-flex { display: flex; gap: 40px; align-items: flex-start; }
        .detail-flex img { width: 220px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        
        .episode-list { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 20px; }
        .ep-btn { 
            background: var(--glass); border: 1px solid var(--glass-border); color: var(--text);
            padding: 12px 20px; min-width: 60px; text-align: center; border-radius: 12px; cursor: pointer; 
            font-size: 13px; font-weight: bold; transition: 0.3s;
        }
        .ep-btn:hover, .ep-btn.active { background: var(--primary); color: white; border-color: var(--primary); transform: translateY(-3px); }

        .section-title { font-size: 16px; letter-spacing: 3px; color: var(--primary); margin: 50px 0 25px; text-transform: uppercase; font-weight: 800; }

        .btn-theater { position: absolute; bottom: 20px; right: 20px; background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 8px 15px; border-radius: 5px; cursor: pointer; z-index: 101; font-size: 12px; backdrop-filter: blur(5px); }

        @media (max-width: 768px) {
            .detail-flex { flex-direction: column; text-align: center; }
            .detail-flex img { width: 160px; margin: auto; }
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        }
    </style>
</head>
<body data-theme="dark">

    <div class="container fade-in">
        <div class="header-nav">
            <h1 onclick="window.location.href='index.html'">PHIMHIU</h1>
            <button style="background:none; border:none; color:var(--text); cursor:pointer; font-size:22px;" onclick="toggleTheme()">🌓</button>
        </div>
        
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="Tìm phim từ server KKPhim..." onkeypress="handleSearch(event)">
        </div>

        <div id="video-container">
            <button class="btn-theater" onclick="toggleTheater()">Chế độ rạp phim</button>
            <div id="dplayer"></div>
            <iframe id="iframe-player" src="" allowfullscreen style="display:none; width:100%; height:100%; border:none;"></iframe>
        </div>
        
        <div id="results-grid" class="movie-grid"></div>
        
        <div id="detail-screen" class="fade-in">
            <div class="detail-flex" id="movie-info-content"></div>
            <div class="section-title">Danh sách tập phim</div>
            <div class="episode-list" id="episodes"></div>
        </div>

        <div id="history-section">
            <div class="section-title">Vừa xem gần đây</div>
            <div id="history-grid" class="movie-grid"></div>
        </div>
    </div>

    <script>
        let dp;
        // API CONFIG - CHUYỂN SANG KKPHIM
        const BASE_URL = "https://phimapi.com";
        const IMG_URL = "https://phimimg.com/";

        function fixImg(url) {
            if (!url) return 'https://via.placeholder.com/200x300?text=No+Image';
            if (url.startsWith('http')) return url;
            return IMG_URL + url;
        }

        window.onload = () => {
            if(localStorage.getItem('theme') === 'light') toggleTheme();
            checkDeepLink();
            displayWatchHistory();
        };

        window.onhashchange = checkDeepLink;

        function toggleTheme() {
            const body = document.body;
            const next = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }

        function toggleTheater() {
            document.body.classList.toggle('theater-mode');
            const isTheater = document.body.classList.contains('theater-mode');
            document.querySelector('.btn-theater').innerText = isTheater ? 'Thoát rạp phim' : 'Chế độ rạp phim';
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function checkDeepLink() {
            const hash = window.location.hash;
            if (hash.startsWith('#/phim/')) showDetail(hash.replace('#/phim/', ''));
        }

        async function handleSearch(event) {
            if (event.key === 'Enter') {
                const query = document.getElementById('searchInput').value.trim();
                if (query) {
                    const response = await fetch(`${BASE_URL}/v1/api/tim-kiem?keyword=${query}`);
                    const data = await response.json();
                    displayResults(data.data.items);
                    document.getElementById('detail-screen').style.display = 'none';
                    document.getElementById('video-container').style.display = 'none';
                }
            }
        }

        function displayResults(items) {
            const grid = document.getElementById('results-grid');
            grid.innerHTML = items.map(item => `
                <div class="movie-card fade-in" onclick="window.location.hash='/phim/${item.slug}'">
                    <img src="${fixImg(item.thumb_url)}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/200x300?text=Error'">
                    <div class="info">
                        <h3>${item.name}</h3>
                        <p>${item.year}</p>
                    </div>
                </div>
            `).join('');
        }

        async function showDetail(slug) {
            const response = await fetch(`${BASE_URL}/v1/api/phim/${slug}`);
            const data = await response.json();
            const movie = data.data.item;
            
            document.getElementById('results-grid').innerHTML = '';
            document.getElementById('history-section').style.display = 'none';
            document.getElementById('detail-screen').style.display = 'block';
            
            const poster = fixImg(movie.thumb_url);
            document.getElementById('movie-info-content').innerHTML = `
                <img src="${poster}" alt="poster" onerror="this.src='https://via.placeholder.com/200x300?text=Error'">
                <div>
                    <h2 id="current-movie-title" style="margin:0; font-size:32px;">${movie.name}</h2>
                    <p style="color:var(--primary); font-weight:bold; margin:10px 0;">${movie.origin_name} • ${movie.year}</p>
                    <p style="font-size:15px; opacity:0.8; line-height:1.8">${movie.content.replace(/<[^>]*>?/gm, '').substring(0,350)}...</p>
                </div>
            `;

            const episodes = movie.episodes[0].server_data;
            document.getElementById('episodes').innerHTML = episodes.map(ep => `
                <div id="ep-${ep.name}" class="ep-btn" 
                     onclick="playSmart('${ep.link_m3u8}', '${ep.link_embed}', '${slug}', '${ep.name}')">${ep.name}</div>
            `).join('');

            const lastEp = localStorage.getItem('last_ep_' + slug);
            if(lastEp) {
                const epObj = episodes.find(e => e.name === lastEp);
                if(epObj) playSmart(epObj.link_m3u8, epObj.link_embed, slug, lastEp);
            }
        }

        function playSmart(m3u8Url, embedUrl, slug, epName) {
            const container = document.getElementById('video-container');
            const movieName = document.getElementById('current-movie-title').innerText;
            const currentThumb = document.querySelector('#movie-info-content img').src;
            
            container.style.display = 'block';
            localStorage.setItem('last_ep_' + slug, epName);
            saveToWatchHistory(movieName, slug, currentThumb);

            if (m3u8Url) {
                document.getElementById('iframe-player').style.display = 'none';
                document.getElementById('dplayer').style.display = 'block';
                if(dp) dp.destroy();
                dp = new DPlayer({
                    container: document.getElementById('dplayer'),
                    autoplay: true, video: { url: m3u8Url, type: 'hls' }, shortcut: true
                });
                const t = document.createElement('div');
                t.innerHTML = `${movieName} - Tập ${epName}`;
                t.style = "position:absolute; top:20px; left:20px; z-index:10; font-size:16px; color:#fff; text-shadow:2px 2px 4px #000; font-weight:bold; pointer-events:none; opacity:0.8;";
                document.getElementById('dplayer').appendChild(t);
            } else {
                if(dp) dp.pause();
                document.getElementById('dplayer').style.display = 'none';
                document.getElementById('iframe-player').style.display = 'block';
                document.getElementById('iframe-player').src = embedUrl;
            }
            document.querySelectorAll('.ep-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('ep-' + epName)?.classList.add('active');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function saveToWatchHistory(name, slug, thumb) {
            let h = JSON.parse(localStorage.getItem('watchHistory')) || [];
            h = h.filter(i => i.slug !== slug);
            h.unshift({ name, slug, thumb });
            localStorage.setItem('watchHistory', JSON.stringify(h.slice(0, 12)));
        }

        function displayWatchHistory() {
            const h = JSON.parse(localStorage.getItem('watchHistory')) || [];
            const grid = document.getElementById('history-grid');
            const section = document.getElementById('history-section');
            if (h.length > 0) {
                section.style.display = 'block';
                grid.innerHTML = h.map(i => `
                    <div class="movie-card fade-in" onclick="window.location.hash='/phim/${i.slug}'">
                        <img src="${fixImg(i.thumb)}" alt="${i.name}" onerror="this.src='https://via.placeholder.com/200x300?text=Error'">
                        <div class="info"><h3>${i.name}</h3></div>
                    </div>
                `).join('');
            } else {
                section.style.display = 'none';
            }
        }
    </script>
</body>
</html>
