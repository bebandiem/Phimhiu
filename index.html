<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Của Hiếu</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 10vh 20px; margin: 0; }
        h1 { letter-spacing: 5px; font-weight: 300; color: #e50914; }
        input { width: 100%; max-width: 400px; padding: 15px; border-radius: 30px; border: 1px solid #333; background: #111; color: #fff; font-size: 16px; outline: none; box-sizing: border-box; }
        .list { width: 100%; max-width: 450px; margin: 30px auto; text-align: left; }
        .item { color: #888; text-decoration: none; display: block; padding: 15px; border-bottom: 1px solid #222; transition: 0.3s; }
        .item:hover { color: #fff; background: #111; }
        .player-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; flex-direction: column; }
        iframe { width: 100%; height: 100%; border: none; }
        .btn-back { padding: 15px; color: #fff; text-decoration: none; background: #222; display: inline-block; cursor: pointer; }
    </style>
</head>
<body>

    <div id="home-screen">
        <h1>CINEMA</h1>
        <input type="text" id="searchInput" placeholder="Nhập tên phim bạn muốn tìm..." onkeypress="handleSearch(event)">
        <div id="results" class="list"></div>
    </div>

    <div id="player-screen" class="player-overlay">
        <div class="btn-back" onclick="closePlayer()">← Quay lại trang chủ</div>
        <iframe id="videoFrame" src="" allowfullscreen></iframe>
    </div>

    <script>
        async function handleSearch(event) {
            if (event.key === 'Enter') {
                const query = document.getElementById('searchInput').value;
                const response = await fetch(`https://ophim1.com/v1/api/tim-kiem?keyword=${query}`);
                const data = await response.json();
                displayResults(data.data.items);
            }
        }

        function displayResults(items) {
            const container = document.getElementById('results');
            container.innerHTML = items.map(item => `
                <a href="#" class="item" onclick="playMovie('${item.slug}')">🎬 ${item.name} (${item.year})</a>
            `).join('');
        }

        async function playMovie(slug) {
            const response = await fetch(`https://ophim1.com/v1/api/phim/${slug}`);
            const data = await response.json();
            const iframeUrl = data.data.item.episodes[0].server_data[0].link_embed;
            
            document.getElementById('videoFrame').src = iframeUrl;
            document.getElementById('player-screen').style.display = 'flex';
            document.getElementById('home-screen').style.display = 'none';
        }

        function closePlayer() {
            document.getElementById('player-screen').style.display = 'none';
            document.getElementById('home-screen').style.display = 'block';
            document.getElementById('videoFrame').src = '';
        }
    </script>
</body>
</html>
