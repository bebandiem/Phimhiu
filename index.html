<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHIMHIU FAST</title>
    
    <!-- Tải CSS trước để hiện giao diện nhanh -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --n-red: #e50914; --bg: #050505; --card-bg: #141414; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; }
        .container { padding: 10px; max-width: 800px; margin: auto; }
        
        /* Skeleton loading effect - tạo cảm giác trang load nhanh hơn */
        .movie-card { background: #222; border-radius: 4px; min-height: 150px; position: relative; overflow: hidden; }
        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; opacity: 0; transition: opacity 0.3s; }
        .movie-card img.loaded { opacity: 1; }

        .movie-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        #video-container { width: 100%; aspect-ratio: 16/9; background: #000; display: none; margin-bottom: 15px; }
        
        .search-box input { width: 100%; padding: 12px; border-radius: 4px; border: none; background: #222; color: #fff; box-sizing: border-box; }
        
        /* Netflix Overlay tối giản cho Mobile */
        #n-overlay { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.5); opacity: 0; transition: 0.2s; }
        #n-overlay.active { opacity: 1; }
        .play-btn { width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.2); border: none; color: #fff; font-size: 24px; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0;">
        <h1 style="color:var(--n-red); margin:0; font-size:24px;" onclick="location.reload()">PHIMHIU</h1>
    </div>

    <div class="search-box" style="margin-bottom: 15px;">
        <input type="text" id="searchInput" placeholder="Tìm phim nhanh..." onkeypress="if(event.key==='Enter') search(this.value)">
    </div>

    <div id="video-container">
        <div id="dplayer"></div>
    </div>

    <div id="movie-grid" class="movie-grid">
        <!-- Phim sẽ hiện ở đây -->
    </div>
</div>

<!-- Tải JS sau cùng để không chặn việc hiện giao diện -->
<script src="https://cdn.jsdelivr.net/npm/hls.js/dist/hls.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.js"></script>

<script>
    const API = "https://ophim1.com";
    let dp = null;

    // FixImg tối ưu tốc độ: Không check link, chỉ ghép string
    function fixImg(url) {
        if (!url) return '';
        return url.startsWith('http') ? url : `https://img.otruyenapi.com/uploads/movies/${url}`;
    }

    // Tải danh sách phim mới ngay lập tức
    async function loadHome() {
        try {
            const res = await fetch(`${API}/danh-sach/phim-moi-cap-nhat?page=1`);
            const data = await res.json();
            render(data.items);
        } catch (e) { console.error("Lỗi tải trang"); }
    }

    function render(items) {
        const grid = document.getElementById('movie-grid');
        grid.innerHTML = items.map(i => `
            <div class="movie-card" onclick="loadDetail('${i.slug}')">
                <img src="${fixImg(i.thumb_url)}" loading="lazy" onload="this.classList.add('loaded')">
                <div style="font-size:10px; padding:4px; white-space:nowrap; overflow:hidden;">${i.name}</div>
            </div>
        `).join('');
    }

    async function search(k) {
        const res = await fetch(`${API}/v1/api/tim-kiem?keyword=${k}`);
        const data = await res.json();
        render(data.data.items);
    }

    async function loadDetail(slug) {
        const res = await fetch(`${API}/phim/${slug}`);
        const data = await res.json();
        const m3u8 = data.episodes[0].server_data[0].link_m3u8;
        
        document.getElementById('video-container').style.display = 'block';
        window.scrollTo({top: 0, behavior: 'smooth'});

        if (dp) dp.destroy();
        dp = new DPlayer({
            container: document.getElementById('dplayer'),
            autoplay: true,
            video: { url: m3u8, type: 'hls' }
        });
    }

    loadHome();
</script>
</body>
</html>
